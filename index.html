:root { --bg:#f5f4f0; --sf:#ffffff; --s2:#ffffff; --bd:#d7d6ce; --bh:#185fa5; --tx:#15171c; --t2:#42454c; --t3:#6b6e76; --ac:#185fa5; --a2:#185fa5; --gn:#2f6e12; --yl:#8a5a0c; --or:#c2410c; --rd:#b32a1c; --mn:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace; --sn:'Raleway',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }

* { margin: 0px; padding: 0px; box-sizing: border-box; }

body { font-family: var(--sn); background: var(--bg); color: var(--tx); min-height: 100vh; }

input, select, button, textarea { font-family: inherit; }

::-webkit-scrollbar { width: 5px; height: 5px; }

::-webkit-scrollbar-track { background: transparent; }

::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 3px; }

#LS { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(ellipse at 30% 20%,rgba(24,95,165,.10)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(24,95,165,.05)0%,transparent 50%),var(--bg); }

}

.lb p { font-size: 13px; color: var(--t2); margin-bottom: 28px; }

.lb input { width: 100%; padding: 12px 16px; background: var(--s2); border: 1px solid var(--bd); border-radius: 10px; color: var(--tx); font-size: 14px; margin-bottom: 16px; outline: none; }

.lb input:focus { border-color: var(--ac); }

.lb button { width: 100%; padding: 12px; background: var(--ac); color: rgb(255, 255, 255); border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }

.le { color: var(--rd); font-size: 12px; margin-top: -8px; margin-bottom: 12px; display: none; }

#AP { display: none; }

.hs b { font-family: var(--mn); }

.ha { display: flex; gap: 6px; flex-wrap: wrap; }

.b { padding: 6px 12px; border-radius: 7px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.15s; white-space: nowrap; }

.bg { background: rgba(34, 197, 94, 0.12); color: var(--gn); }

.br { background: rgba(239, 68, 68, 0.12); color: var(--rd); }

.bo { background:#fff; border:1px solid #d8d6cd; color:#595959; }

.db { display: flex; gap: 5px; padding: 8px 20px; overflow-x: auto; border-bottom: 1px solid var(--bd); }

.di { background: var(--sf); border: 1px solid var(--bd); border-radius: 7px; padding: 6px 12px; flex: 0 0 auto; }

.di .dl { font-size: 8px; color: var(--t3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }

.di .dv { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }

.di .dv b { font-family: var(--mn); font-size: 12px; font-weight: 700; }

.di .dv span { font-size: 9px; color: var(--t3); }

.dt { height: 3px; background: rgba(0,0,0,0.05); border-radius: 2px; overflow: hidden; }

.df { height: 100%; border-radius: 2px; transition: width 0.5s; }

.ct { padding: 0px 20px 20px; display: flex; gap: 14px; margin-top: 12px; }

.mn { flex: 1 1 0%; min-width: 0px; overflow: auto; max-height: calc(-210px + 100vh); }

.pn { width: 380px; flex-shrink: 0; background: var(--sf); border: 1px solid var(--bd); border-radius: 10px; padding: 16px; max-height: calc(-200px + 100vh); overflow-y: auto; animation: 0.2s ease 0s 1 normal none running si; }

@keyframes si { 
  0% { opacity: 0; transform: translateX(10px); }
  100% { opacity: 1; transform: translateX(0px); }
}

.xtbl { width: 100%; border-collapse: collapse; font-size: 12px; }

.xtbl th { position: sticky; top: 0px; background: var(--bg); border-bottom: 2px solid var(--bd); padding: 0px; z-index: 5; text-align: left; font-weight: 600; font-size: 11px; color: var(--t2); user-select: none; }

.xtbl th .thw { padding: 7px 10px; display: flex; align-items: center; gap: 4px; cursor: pointer; white-space: nowrap; transition: color 0.15s; }

.xtbl th .flt input, .xtbl th .flt select { width: 100%; padding: 3px 6px; background: rgba(0,0,0,0.04); border: 1px solid var(--bd); border-radius: 4px; color: var(--tx); font-size: 10px; outline: none; }

.xtbl th .flt input:focus, .xtbl th .flt select:focus { border-color: var(--ac); }

.xtbl td { padding: 7px 10px; border-bottom: 1px solid var(--bd); vertical-align: middle; }

.sb { font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }

.tchip { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 3px; font-size: 10px; color: var(--t2); display: inline-block; margin: 0px 1px 1px 0px; }

.ph { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }

.pt { font-size: 16px; font-weight: 700; }

.ps2 { font-size: 11px; color: var(--t2); margin-top: 2px; }

.psc { font-size: 9px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 0.06em; margin: 12px 0px 5px; }

.pr2 { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: rgba(0,0,0,0.03); border-radius: 5px; margin-bottom: 2px; font-size: 11px; }

.rb { background: none; border: none; color: var(--rd); cursor: pointer; font-size: 13px; padding: 1px; }

.ac { display: flex; flex-wrap: wrap; gap: 3px; max-height: 120px; overflow-y: auto; }

.ach { background: rgba(24, 95, 165, 0.06); border: 1px solid rgba(24, 95, 165, 0.12); color: rgb(13, 74, 130); padding: 2px 7px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 500; }

.ach:hover { background: rgba(24, 95, 165, 0.15); }

.pi { width: 48px; background: var(--s2); border: 1px solid var(--bd); border-radius: 3px; color: var(--tx); font-family: var(--mn); font-size: 10px; padding: 2px 3px; text-align: center; outline: none; }

.pi:focus { border-color: var(--ac); }

.rr { display: flex; align-items: center; gap: 5px; font-size: 10px; margin-bottom: 2px; }

.rfl { height: 100%; border-radius: 2px; opacity: 0.7; }

.rv { font-family: var(--mn); font-size: 10px; color: var(--t2); min-width: 30px; text-align: right; }

.mw { overflow-x: auto; }

.mx { width: 34px; height: 20px; border-radius: 3px; margin: 0px auto; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 600; transition: 0.12s; user-select: none; }

.abar { padding: 10px 16px; background: rgba(24, 95, 165, 0.06); border: 1px solid rgba(24, 95, 165, 0.12); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }

@media (max-width: 900px) {

}
function liFriendly(err){
  const code=err&&err.code||'';
  const map={'auth/invalid-email':'Invalid email address.','auth/invalid-credential':'Incorrect email or password.','auth/user-not-found':'No account found for this email.','auth/wrong-password':'Incorrect password.','auth/email-already-in-use':'An account already exists for this email.','auth/weak-password':'Password too weak (min. 8 characters).','auth/too-many-requests':'Too many attempts. Try again later.','auth/network-request-failed':'Network error. Check your connection.'};
  return map[code]||(err&&err.message)||'Something went wrong. Please try again.';
}

async function liSubmit(e){
  e.preventDefault();
  const email=((document.getElementById('li-email')||{}).value||'').trim();
  const password=(document.getElementById('li-password')||{}).value||'';
  try{
    if(!email.toLowerCase().endsWith('@jakala.com'))throw new Error('Only @jakala.com addresses are allowed.');
    if(_liMode==='signin'){await _auth.signInWithEmailAndPassword(email,password);}
    else if(_liMode==='signup'){if(password.length<8)throw new Error('Password must be at least 8 characters.');await _auth.createUserWithEmailAndPassword(email,password);}
    else if(_liMode==='reset'){await _auth.sendPasswordResetEmail(email);liRender('','Reset email sent. Check your inbox.');}
  }catch(err){liRender(liFriendly(err),'');}
}

// ── Access management: invite allowlist (config/access) + users (same model as Quotation Hub) ──
async function uGetInvites(){
  try{
    const s=await _fs.collection('config').doc('access').get();
    if(!s.exists)return[];
    const d=s.data();
    if(Array.isArray(d.invites))return d.invites.map(e=>({email:String(e.email).toLowerCase(),role:e.role==='admin'?'admin':'member'}));
    if(Array.isArray(d.emails))return d.emails.map(e=>({email:String(e).toLowerCase(),role:'member'}));
    return[];
  }catch(e){console.error('uGetInvites',e);return[];}
}
async function uSaveInvites(invites){await _fs.collection('config').doc('access').set({invites,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
async function uAddInvite(email,role){
  const e=String(email).trim().toLowerCase();
  if(!e.endsWith('@jakala.com'))throw new Error('Only @jakala.com addresses can be invited.');
  const r=role==='admin'?'admin':'member';
  const inv=await uGetInvites();const i=inv.findIndex(x=>x.email===e);
  if(i>=0)inv[i].role=r;else inv.push({email:e,role:r});
  await uSaveInvites(inv);
}
async function uRemoveInvite(email){const e=String(email).trim().toLowerCase();await uSaveInvites((await uGetInvites()).filter(x=>x.email!==e));}
async function uSetInviteRole(email,role){await uAddInvite(email,role);}
async function uListUsers(){
  try{const s=await _fs.collection('users').orderBy('displayName').get();return s.docs.map(d=>Object.assign({uid:d.id},d.data()));}
  catch(e){console.error('uListUsers',e);return[];}
}
async function uSetUserRole(uid,role){await _fs.collection('users').doc(uid).set({role:role==='admin'?'admin':'member',updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
async function uSetUserActive(uid,active){await _fs.collection('users').doc(uid).set({active:!!active,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}

_auth.onAuthStateChanged(async function(fu){
  if(!fu){_user=null;_profile=null;document.getElementById('AP').style.display='none';liRender('','');return;}
  if(!fu.email||!fu.email.toLowerCase().endsWith('@jakala.com')){await _auth.signOut();liRender('Only @jakala.com addresses are allowed.','');return;}
  try{
    const ref=_fs.collection('users').doc(fu.uid);
    const snap=await ref.get();
    const isBoot=BOOTSTRAP_ADMINS.indexOf(fu.email.toLowerCase())>=0;
    const autoName=displayNameFromEmail(fu.email);
    const TS=firebase.firestore.FieldValue.serverTimestamp;
    if(!snap.exists){
      // First appearance: gate by the invite allowlist (bootstrap admins always allowed)
      let invitedRole=null;
      if(!isBoot){const inv=await uGetInvites();const f=inv.find(x=>x.email===fu.email.toLowerCase());invitedRole=f?f.role:null;}
      if(!(isBoot||invitedRole!=null)){await _auth.signOut();liRender('This email has not been invited. Ask an administrator to add you.','');return;}
      const profile={email:fu.email,displayName:autoName,role:isBoot?'admin':(invitedRole||'member'),active:true,createdAt:TS(),updatedAt:TS()};
      await ref.set(profile);_profile=profile;
    }else{
      const data=snap.data();
      if(data.active===false){await _auth.signOut();liRender('Your account has been disabled. Contact an administrator.','');return;}
      const updates={};
      if(isBoot&&data.role!=='admin')updates.role='admin';
      if(!data.displayName||data.displayName===data.email)updates.displayName=autoName;
      if(Object.keys(updates).length){updates.updatedAt=TS();await ref.set(updates,{merge:true});}
      _profile=Object.assign({},data,updates);
    }
  }catch(ex){console.error('Profile load error:',ex);_profile={email:fu.email,displayName:displayNameFromEmail(fu.email),role:'member'};}
  _user=fu;
  document.getElementById('LS').style.display='none';
  document.getElementById('AP').style.display='block';
  document.getElementById('AP').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:80vh;color:var(--t2);font-size:16px">Loading data...</div>';
  ld(function(){R();});
});

// Auto-calculate percentages weighted by available capacity
function autoCalc(pid){
  const p=S.p.find(x=>x.id===pid);if(!p)return;
  if(!p.asgn)p.asgn={};
  // Get all linked members
  const linked=Object.keys(p.asgn).map(mid=>S.m.find(m=>m.id===mid)).filter(Boolean);
  if(!linked.length)return;
  // Group by Price Level
  const byPL={};linked.forEach(m=>{const pk='PL'+rPL(m.role);if(!byPL[pk])byPL[pk]=[];byPL[pk].push(m)});
  // For each PL, distribute proportionally to available capacity
  const newAsgn={};
  Object.entries(byPL).forEach(([pk,members])=>{
    const daysNeeded=p.daysByRole[pk]||0;
    if(daysNeeded<=0){members.forEach(m=>{newAsgn[m.id]=0.1});return}
    // Available capacity for each member (excluding current project)
    const avails=members.map(m=>{
      const curOnThis=p.asgn[m.id]||0;
      const otherEf=mEf(m.id)-curOnThis;
      const avail=Math.max(100-otherEf,0);
      return{m,avail,cap:m.cap||220}
    });
    const totalAvailCap=avails.reduce((t,a)=>t+a.avail/100*a.cap,0);
    if(totalAvailCap<=0){avails.forEach(a=>{newAsgn[a.m.id]=0.1});return}
    // How much % of each person's capacity we need
    avails.forEach(a=>{
      // Proportion of this person's available capacity vs total available
      const share=totalAvailCap>0?(a.avail/100*a.cap)/totalAvailCap:1/avails.length;
      const daysForThis=daysNeeded*share;
      let pct=a.cap>0?(daysForThis/a.cap)*100:0;
      pct=Math.min(pct,a.avail); // cap at available
      pct=Math.round(pct/5)*5; // round to nearest 5
      pct=Math.max(pct,5); // minimum 5%
      pct=Math.min(pct,a.avail); // re-cap
      newAsgn[a.m.id]=pct;
    });
  });
  // Apply
  Object.entries(newAsgn).forEach(([mid,pct])=>{
    if(pct>0)p.asgn[mid]=pct;else delete p.asgn[mid]
  });
  S.aStep='review';
  sv();R()
}

// Auto-calc for person mode: distribute this person's available capacity across linked projects
function autoCalcPerson(mid){
  const m=S.m.find(x=>x.id===mid);if(!m)return;
  // Find all projects this person is linked to
  const linkedPs=S.p.filter(p=>p.asgn?.[mid]>0);
  if(!linkedPs.length)return;
  // For each project, compute how much of this person's role days are needed
  const curOnOther=mEf(mid)-linkedPs.reduce((t,p)=>t+(p.asgn[mid]||0),0);
  const totalAvail=Math.max(100-curOnOther,0);
  // Weight by days needed for this role on each project
  const weights=linkedPs.map(p=>{
    const mPLk='PL'+rPL(m.role);const daysForRole=p.daysByRole[mPLk]||0;
    // Subtract what other people already cover for this role
    const othersOnPL=pAsg(p.id).filter(a=>rPL(a.m.role)===rPL(m.role)&&a.mid!==mid).reduce((t,a)=>t+(a.pct/100)*(a.m.cap||220),0);
    const remaining=Math.max(daysForRole-othersOnPL,0);
    return{p,w:remaining}
  });
  const totalW=weights.reduce((t,x)=>t+x.w,0);
  if(totalW<=0){weights.forEach(x=>{if(x.p.asgn)x.p.asgn[mid]=Math.round(totalAvail/weights.length/5)*5||5});sv();S.aStep='review';R();return}
  weights.forEach(x=>{
    let pct=(x.w/totalW)*totalAvail;
    pct=Math.round(pct/5)*5;
    pct=Math.max(pct,5);
    pct=Math.min(pct,totalAvail);
    if(x.p.asgn)x.p.asgn[mid]=pct;
  });
  // Verify total doesn't exceed available
  let total=linkedPs.reduce((t,p)=>t+(p.asgn[mid]||0),0);
  while(total>totalAvail&&linkedPs.length){
    const maxP=linkedPs.reduce((a,b)=>(a.asgn[mid]||0)>(b.asgn[mid]||0)?a:b);
    maxP.asgn[mid]=Math.max((maxP.asgn[mid]||0)-5,0);
    total=linkedPs.reduce((t,p)=>t+(p.asgn[mid]||0),0);
  }
  S.aStep='review';
  sv();R()
}

let _uUsers=null,_uInvites=null,_uLoading=false;
function uLoad(){_uLoading=true;R();Promise.all([uListUsers(),uGetInvites()]).then(function(r){_uUsers=r[0];_uInvites=r[1];_uLoading=false;R();}).catch(function(){_uUsers=[];_uInvites=[];_uLoading=false;R();});}

function renderUsers(){
  var adm=isAdmin();
  if(_uLoading||_uUsers===null||_uInvites===null)return '<div style="flex:1;text-align:center;padding:50px;color:var(--t2);font-size:14px">Loading users...</div>';
  var me=_user?_user.uid:null;
  var invRows=_uInvites.length?_uInvites.map(function(i){
    var roleCell=adm?'<select onchange="uChgInviteRole(\''+esc(i.email)+'\',this.value)"><option value="member"'+(i.role!=='admin'?' selected':'')+'>Member</option><option value="admin"'+(i.role==='admin'?' selected':'')+'>Admin</option></select>':uRoleBadge(i.role);
    var act=adm?'<button class="b br" onclick="uRmInvite(\''+esc(i.email)+'\')">Remove</button>':'';
    return '<tr><td>'+esc(i.email)+'</td><td>'+roleCell+'</td><td class="ctr">'+act+'</td></tr>';
  }).join(''):'<tr><td colspan="3" style="text-align:center;color:var(--t3);padding:14px">No invited emails.</td></tr>';
  var inviteForm=adm?'<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"><input id="u-email" type="email" placeholder="name.surname@jakala.com" class="si" style="flex:1;min-width:240px;width:auto"><select id="u-role" class="si" style="width:120px"><option value="member">Member</option><option value="admin">Admin</option></select><button class="b ba" onclick="uDoInvite()">Invite</button></div>':'';
  var usrRows=_uUsers.length?_uUsers.map(function(u){
    var active=u.active!==false,isMe=u.uid===me;
    var roleCell=(adm&&!isMe)?'<select onchange="uChgUserRole(\''+u.uid+'\',this.value)"><option value="member"'+(u.role==='member'?' selected':'')+'>Member</option><option value="admin"'+(u.role==='admin'?' selected':'')+'>Admin</option></select>':uRoleBadge(u.role);
    var statusCell=active?'<span class="sb" style="background:rgba(47,110,18,.12);color:#2f6e12">Active</span>':'<span class="sb" style="background:rgba(0,0,0,.06);color:#42454c">Disabled</span>';
    var act=(adm&&!isMe)?(active?'<button class="b br" onclick="uDisable(\''+u.uid+'\')">Disable</button>':'<button class="b bg" onclick="uEnable(\''+u.uid+'\')">Re-enable</button>'):(isMe?'<span style="font-size:10px;color:var(--t3)">(you)</span>':'');
    return '<tr style="'+(active?'':'opacity:.55')+'"><td>'+esc(u.displayName||'')+'</td><td>'+esc(u.email||'')+'</td><td>'+roleCell+'</td><td>'+statusCell+'</td><td class="ctr">'+act+'</td></tr>';
  }).join(''):'<tr><td colspan="5" style="text-align:center;color:var(--t3);padding:18px">No users yet.</td></tr>';
  return '<div class="ucard"><div class="uct">Invited emails (access list)</div><div class="ucs">Only invited emails can register and sign in. Choose the role at invite time: the person receives it on first login. Then share the app link and the invited person registers, setting their own password.</div>'+inviteForm+'<table class="utbl"><thead><tr><th>Email</th><th>Role on first login</th><th class="ctr">Action</th></tr></thead><tbody>'+invRows+'</tbody></table></div>'
    +'<div class="ucard"><div class="uct">Users</div><div class="ucs">Users appear here automatically after their first login. From here you can change their role or disable their access.</div><table class="utbl"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th class="ctr">Actions</th></tr></thead><tbody>'+usrRows+'</tbody></table></div>';
}
